<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>給与明細 可視化（完全版）</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;padding:20px;background:#f5f5f7}
.tabs{display:flex;gap:8px;margin-top:10px}
.tab{padding:6px 12px;background:#ddd;border-radius:8px;cursor:pointer}
.tab.active{background:#007aff;color:#fff}
.section{display:none;margin-top:15px}
.section.active{display:block}
label{display:inline-block;margin:4px 8px 4px 0}
canvas{margin-top:20px;background:#fff;border-radius:12px;padding:10px}
</style>

</head>

<body>

<h2>給与明細 推移グラフ（完全対応版）</h2>
<input type="file" id="pdfInput" multiple accept="application/pdf">

<div class="tabs">
<div class="tab active" onclick="switchTab(event,'income')">入金</div>
<div class="tab" onclick="switchTab(event,'expense')">出金</div>
<div class="tab" onclick="switchTab(event,'net')">手取り</div>
</div>
<div id="income" class="section active"></div>
<div id="expense" class="section"></div>
<div id="net" class="section"></div>

<canvas id="chart" height="120"></canvas>

<script>

const incomeItems=[
"基準賃金等","超過勤務手当","通勤費補助",
"持株会補助手当","家賃援助（社宅）",
"ＷＥＬ加算１Ａ","支給合計"
];

const expenseItems=[
"雇用保険料","健康保険料（基本","健康保険料（特定",
"年金保険料","所得税","住民税",
"ＤＣ従業員拠出","すまいるプラン",
"持株会","労働組合費",
"ハッピーライフ","食事代","控除合計"
];

const netItems=["差引支給額","振込額"];

let salaryData={};
let monthLabels=[];
let chart;

function createCheckboxes(id,items){
const div=document.getElementById(id);
items.forEach(item=>{
const label=document.createElement("label");
label.innerHTML=`<input type="checkbox" value="${item}">${item}`;
div.appendChild(label);
});
}

createCheckboxes("income",incomeItems);
createCheckboxes("expense",expenseItems);
createCheckboxes("net",netItems);

function switchTab(e,name){
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
e.target.classList.add("active");
document.getElementById(name).classList.add("active");
drawChart();
}

document.getElementById("pdfInput").addEventListener("change",async function(e){

salaryData={};
monthLabels=[];

const files=Array.from(e.target.files).sort((a,b)=>a.name.localeCompare(b.name));
let index=1;

for(const file of files){
await readPDF(file);
monthLabels.push("月"+index);
index++;
}

drawChart();
});

async function readPDF(file){
const reader=new FileReader();
await new Promise(resolve=>{
reader.onload=async function(){
const pdf=await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
const page=await pdf.getPage(1);
const textContent=await page.getTextContent();
const text=textContent.items.map(i=>i.str).join(" ");

[...incomeItems,...expenseItems,...netItems].forEach(label=>{
extract(text,label);
});

resolve();
};
reader.readAsArrayBuffer(file);
});
}

function extract(text,label){
const regex=new RegExp(label+"[^0-9]*([0-9,]+)","i");
const match=text.match(regex);
if(match){
const value=parseInt(match[1].replace(/,/g,""));
if(!salaryData[label])salaryData[label]=[];
salaryData[label].push(value);
}
}

function drawChart(){
const selected=document.querySelectorAll("input[type=checkbox]:checked");
const datasets=[];
selected.forEach(cb=>{
if(salaryData[cb.value]){
datasets.push({
label:cb.value,
data:salaryData[cb.value],
borderWidth:2,
tension:0.2
});
}
});
if(chart)chart.destroy();
chart=new Chart(document.getElementById("chart"),{
type:"line",
data:{labels:monthLabels,datasets:datasets},
options:{
responsive:true,
plugins:{legend:{position:"bottom"}},
scales:{y:{ticks:{callback:(v)=>v.toLocaleString()+"円"}}}
}
});
}

document.addEventListener("change",function(e){
if(e.target.type==="checkbox")drawChart();
});

</script>
</body>
</html>
